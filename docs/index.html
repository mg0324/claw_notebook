<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的日记本</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #e8e4df;
      --text: #2c2c2c;
      --text-secondary: #888;
      --accent: #d4845a;
      --accent-light: #fdf0e8;
      --accent-hover: #c07248;
      --danger: #e05c5c;
      --danger-hover: #c94848;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --font: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .app { max-width: 680px; margin: 0 auto; padding: 24px 16px 80px; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .header-left h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header-left p {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-weight: 500;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--border); color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: var(--danger-hover); }
    .btn-sm { padding: 6px 14px; font-size: 0.82rem; }

    /* ── Diary List ── */
    .list-empty {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-secondary);
    }
    .list-empty .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .list-empty p { font-size: 0.95rem; }

    .diary-list { display: flex; flex-direction: column; gap: 12px; }

    .diary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      cursor: pointer;
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.1s;
      position: relative;
    }
    .diary-card:hover {
      box-shadow: var(--shadow);
      border-color: #d4c8be;
      transform: translateY(-1px);
    }
    .diary-card:active { transform: translateY(0); }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-date {
      font-size: 0.78rem;
      color: var(--text-secondary);
      white-space: nowrap;
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 20px;
    }
    .card-preview {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mood-tag {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--accent-light);
      color: var(--accent);
    }

    /* ── Detail View ── */
    .detail-view { display: none; }
    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.875rem;
      margin-bottom: 20px;
      transition: color 0.15s;
    }
    .detail-back:hover { color: var(--accent); }

    .detail-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
    }
    .detail-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .detail-date-badge {
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
    }
    .detail-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .detail-divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }
    .detail-content {
      font-size: 0.95rem;
      line-height: 1.9;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .detail-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      justify-content: flex-end;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(2px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.22s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 0;
    }
    .modal-title { font-size: 1.1rem; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--bg);
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary);
      transition: background 0.15s;
    }
    .modal-close:hover { background: var(--border); }

    .modal-body { padding: 16px 24px 24px; }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: var(--font);
      font-size: 0.95rem;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.15s;
      outline: none;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--accent);
      background: #fff;
    }
    .form-textarea {
      resize: vertical;
      min-height: 180px;
      line-height: 1.7;
    }
    .form-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 8px;
    }

    /* ── Confirm Dialog ── */
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(2px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-box {
      background: var(--surface);
      border-radius: 14px;
      padding: 28px 28px 22px;
      max-width: 360px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      text-align: center;
      animation: slideUp 0.2s ease;
    }
    .confirm-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .confirm-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 6px; }
    .confirm-desc { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 20px; }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }

    /* ── Toast ── */
    .toast-wrap {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: #2c2c2c;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── Search ── */
    .search-bar {
      position: relative;
      margin-bottom: 20px;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 0.9rem;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px 10px 36px;
      font-family: var(--font);
      font-size: 0.9rem;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }

    /* ── Category Filter ── */
    .category-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }
    .category-tag {
      font-size: 0.8rem;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .category-tag:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .category-tag.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .category-tag-add {
      border-style: dashed;
    }
    .category-manage-btn {
      font-size: 0.8rem;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .category-manage-btn:hover {
      background: var(--border);
      color: var(--text);
    }
    
    /* ── Category Label ── */
    .diary-category {
      font-size: 0.72rem;
      padding: 2px 10px;
      border-radius: 20px;
      color: #fff;
      font-weight: 500;
      display: inline-block;
    }
    .diary-category.category-life { background: #4CAF50; }
    .diary-category.category-work { background: #2196F3; }
    .diary-category.category-study { background: #9C27B0; }
    .diary-category.category-other { background: #FF9800; }
    .diary-category.category-default { background: #9E9E9E; }
    
    /* ── Category Manage ── */
    .category-manage-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .category-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .category-item .cat-color {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .category-item button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.9rem;
      padding: 0;
      line-height: 1;
    }
    .category-item button:hover { color: var(--danger); }
    .category-add-row {
      display: flex;
      gap: 8px;
    }
    .category-add-row input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.85rem;
    }

    /* ── Count badge ── */
    .count-badge {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    .count-badge span { color: var(--accent); font-weight: 600; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  </style>
</head>
<body>

<div class="app" id="app">

  <!-- ═══ LIST VIEW ═══ -->
  <div id="listView">
    <div class="header">
      <div class="header-left">
        <h1>📖 我的日记</h1>
        <p id="todayStr"></p>
      </div>
      <button class="btn btn-primary" onclick="openModal()">✏️ 写日记</button>
    </div>

    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜索日记标题或内容…" oninput="renderList()" />
    </div>

    <div class="category-filter" id="categoryFilter"></div>

    <div class="count-badge" id="countBadge"></div>

    <div class="diary-list" id="diaryList"></div>
  </div>

  <!-- ═══ DETAIL VIEW ═══ -->
  <div id="detailView" class="detail-view">
    <div class="detail-back" onclick="showList()">← 返回列表</div>
    <div class="detail-card">
      <div class="detail-meta">
        <span class="detail-date-badge" id="detailDate"></span>
        <span class="diary-category" id="detailCategory" style="display:none"></span>
      </div>
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-divider"></div>
      <div class="detail-content" id="detailContent"></div>
      <div class="detail-actions">
        <button class="btn btn-ghost btn-sm" onclick="editCurrentDiary()">✏️ 编辑</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCurrentDiary()">🗑 删除</button>
      </div>
    </div>
  </div>

</div>

<!-- ═══ WRITE / EDIT MODAL ═══ -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">写日记</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">标题</label>
        <input class="form-input" type="text" id="formTitle" placeholder="给这篇日记起个标题…" maxlength="60" />
      </div>
      <div class="form-group">
        <label class="form-label">正文</label>
        <textarea class="form-textarea" id="formContent" placeholder="今天发生了什么，写下来吧…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input class="form-input" type="date" id="formDate" />
      </div>
      <div class="form-group">
        <label class="form-label">分类</label>
        <select class="form-select" id="formCategory">
          <option value="">选择分类...</option>
        </select>
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveDiary()">💾 保存</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ CONFIRM DIALOG ═══ -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑</div>
    <div class="confirm-title">确认删除</div>
    <div class="confirm-desc">这篇日记删除后不可恢复，确定继续吗？</div>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
    </div>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div class="toast-wrap">
  <div class="toast" id="toast"></div>
</div>

<!-- ═══ CATEGORY MANAGE MODAL ═══ -->
<div class="modal-overlay" id="categoryModalOverlay" onclick="handleCategoryOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">管理分类</span>
      <button class="modal-close" onclick="closeCategoryModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="category-manage-list" id="categoryManageList"></div>
      <div class="category-add-row">
        <input type="text" id="newCategoryInput" placeholder="输入新分类名称…" maxlength="10" onkeypress="handleCategoryKeypress(event)" />
        <button class="btn btn-primary btn-sm" onclick="addCategory()">添加</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Local Storage Configuration ──
const STORAGE_KEY = 'diary_entries';
const CATEGORY_STORAGE_KEY = 'diary_categories';

// 默认分类
const DEFAULT_CATEGORIES = ['生活', '工作', '学习', '其他'];

// 分类颜色映射
const CATEGORY_COLORS = {
  '生活': '#4CAF50',
  '工作': '#2196F3',
  '学习': '#9C27B0',
  '其他': '#FF9800'
};

// ── Local Storage Functions ──
function loadDiaries() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { return []; }
}

function saveDiaries(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function loadCategories() {
  try {
    const stored = localStorage.getItem(CATEGORY_STORAGE_KEY);
    if (stored) return JSON.parse(stored);
  } catch { }
  return DEFAULT_CATEGORIES.slice();
}

function saveCategories(categories) {
  localStorage.setItem(CATEGORY_STORAGE_KEY, JSON.stringify(categories));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// 获取分类颜色
function getCategoryColor(category) {
  return CATEGORY_COLORS[category] || '#9E9E9E';
}

// 获取分类的CSS类名
function getCategoryClass(category) {
  const map = {
    '生活': 'category-life',
    '工作': 'category-work',
    '学习': 'category-study',
    '其他': 'category-other'
  };
  return map[category] || 'category-default';
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// ── State ──
let currentDiaryId = null;
let editingId = null;
let pendingDeleteId = null;
let currentCategoryFilter = '';

// ── Date Helpers ──
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const year = d.getFullYear();
  const month = d.getMonth() + 1;
  const day = d.getDate();
  const weekDays = ['日','一','二','三','四','五','六'];
  const wd = weekDays[d.getDay()];
  return `${year}年${month}月${day}日 · 周${wd}`;
}

function formatDateFull() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const day = now.getDate();
  const weekDays = ['日','一','二','三','四','五','六'];
  const wd = weekDays[now.getDay()];
  return `${year}年${month}月${day}日 · 周${wd}`;
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('todayStr').textContent = formatDateFull();
  document.getElementById('formDate').value = todayStr();
  renderCategoryFilter();
  renderList();
});

// ── Category Filter ──
function renderCategoryFilter() {
  const categories = loadCategories();
  const container = document.getElementById('categoryFilter');
  
  let html = `<span class="category-tag ${currentCategoryFilter === '' ? 'active' : ''}" onclick="filterByCategory('')">全部</span>`;
  
  categories.forEach(cat => {
    const catName = cat.name || cat;
    html += `<span class="category-tag ${currentCategoryFilter === catName ? 'active' : ''}" onclick="filterByCategory('${escHtml(catName)}')">${escHtml(catName)}</span>`;
  });
  
  html += `<button class="category-manage-btn" onclick="openCategoryModal()">⚙️ 管理</button>`;
  
  container.innerHTML = html;
}

function filterByCategory(category) {
  currentCategoryFilter = category;
  renderCategoryFilter();
  renderList();
}

// ── Category Manage ──
function openCategoryModal() {
  renderCategoryManageList();
  document.getElementById('categoryModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('newCategoryInput').focus(), 100);
}

function closeCategoryModal() {
  document.getElementById('categoryModalOverlay').classList.remove('open');
}

function handleCategoryOverlayClick(e) {
  if (e.target === document.getElementById('categoryModalOverlay')) {
    closeCategoryModal();
  }
}

function handleCategoryKeypress(e) {
  if (e.key === 'Enter') {
    addCategory();
  }
}

function renderCategoryManageList() {
  const categories = loadCategories();
  const container = document.getElementById('categoryManageList');
  
  let html = '';
  categories.forEach((cat, index) => {
    const color = getCategoryColor(cat);
    html += `<div class="category-item">
      <span class="cat-color" style="background:${color}"></span>
      <span>${escHtml(cat)}</span>
      <button onclick="deleteCategory(${index})" title="删除">×</button>
    </div>`;
  });
  
  container.innerHTML = html;
}

function addCategory() {
  const input = document.getElementById('newCategoryInput');
  const name = input.value.trim();
  
  if (!name) {
    showToast('请输入分类名称');
    return;
  }
  
  const categories = loadCategories();
  
  if (categories.includes(name)) {
    showToast('该分类已存在');
    return;
  }
  
  categories.push(name);
  saveCategories(categories);
  input.value = '';
  
  renderCategoryManageList();
  renderCategoryFilter();
  updateCategorySelect();
  
  showToast('✅ 分类已添加');
}

function deleteCategory(index) {
  const categories = loadCategories();
  const catName = categories[index];
  
  // 检查是否有日记使用该分类
  const diaries = loadDiaries();
  const usedCount = diaries.filter(d => d.category === catName).length;
  
  if (usedCount > 0) {
    showToast(`该分类下有 ${usedCount} 篇日记，无法删除`);
    return;
  }
  
  categories.splice(index, 1);
  saveCategories(categories);
  
  // 如果当前筛选的分类被删除，重置筛选
  if (currentCategoryFilter === catName) {
    currentCategoryFilter = '';
  }
  
  renderCategoryManageList();
  renderCategoryFilter();
  updateCategorySelect();
  
  showToast('✅ 分类已删除');
}

// 更新分类下拉框
async function updateCategorySelect() {
  const categories = loadCategories();
  const select = document.getElementById('formCategory');
  const currentVal = select.value;
  
  let html = '<option value="">选择分类...</option>';
  categories.forEach(cat => {
    const catName = cat.name || cat;
    html += `<option value="${escHtml(catName)}">${escHtml(catName)}</option>`;
  });
  
  select.innerHTML = html;
  select.value = currentVal;
}

// ── List Render ──
function renderList() {
  const diaries = loadDiaries();
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const badge = document.getElementById('countBadge');
  const container = document.getElementById('diaryList');

  // Sort by date desc, then by createdAt desc
  let sorted = [...diaries].sort((a, b) => {
    if (b.date !== a.date) return b.date.localeCompare(a.date);
    return (b.createdAt || 0) - (a.createdAt || 0);
  });

  // 搜索过滤
  if (q) {
    sorted = sorted.filter(d =>
      (d.title || '').toLowerCase().includes(q) || (d.content || '').toLowerCase().includes(q)
    );
  }

  // 分类过滤
  if (currentCategoryFilter) {
    sorted = sorted.filter(d => !currentCategoryFilter || d.category === currentCategoryFilter || !d.category);
  }

  const total = diaries.length;
  const filtered = sorted.length;
  let badgeText = '';
  if (total > 0) {
    if (currentCategoryFilter) {
      badgeText = `分类「${currentCategoryFilter}」: <span>${filtered}</span> 篇`;
    } else if (q) {
      badgeText = `搜索结果: <span>${filtered}</span> 篇`;
    } else {
      badgeText = `共 <span>${filtered}</span> 篇日记`;
    }
  }
  badge.innerHTML = badgeText;

  if (sorted.length === 0) {
    let emptyMsg = '还没有日记，点击"写日记"开始记录吧！';
    if (q) {
      emptyMsg = '没有找到匹配的日记';
    } else if (currentCategoryFilter) {
      emptyMsg = `分类「${currentCategoryFilter}」下还没有日记`;
    }
    container.innerHTML = `
      <div class="list-empty">
        <div class="empty-icon">${q ? '🔍' : '📝'}</div>
        <p>${emptyMsg}</p>
      </div>`;
    return;
  }

  container.innerHTML = sorted.map(d => {
    const preview = (d.content || '').slice(0, 80).replace(/\n/g, ' ');
    const hasMore = (d.content || '').length > 80;
    const categoryHtml = d.category ? `<span class="diary-category ${getCategoryClass(d.category)}">${escHtml(d.category)}</span>` : '';
    
    return `
      <div class="diary-card" onclick="showDetail('${d.id}')">
        <div class="card-header">
          <div class="card-title">${escHtml(d.title || '无标题')}</div>
          <div style="display:flex;align-items:center;gap:8px;">
            ${categoryHtml}
            <span class="card-date">${d.date ? d.date.replace(/-/g, '/') : ''}</span>
          </div>
        </div>
        <div class="card-preview">${escHtml(preview)}${hasMore ? '…' : ''}</div>
      </div>`;
  }).join('');
}

// ── Detail ──
function showDetail(id) {
  const diaries = loadDiaries();
  const diary = diaries.find(d => d.id === id);
  if (!diary) return;
  currentDiaryId = id;

  document.getElementById('detailDate').textContent = formatDate(diary.date);
  document.getElementById('detailTitle').textContent = diary.title || '无标题';
  document.getElementById('detailContent').textContent = diary.content || '';
  
  // 显示分类标签
  const categoryEl = document.getElementById('detailCategory');
  if (diary.category) {
    categoryEl.textContent = diary.category;
    categoryEl.className = `diary-category ${getCategoryClass(diary.category)}`;
    categoryEl.style.display = 'inline-block';
  } else {
    categoryEl.style.display = 'none';
  }

  document.getElementById('listView').style.display = 'none';
  const dv = document.getElementById('detailView');
  dv.style.display = 'block';
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('listView').style.display = 'block';
  currentDiaryId = null;
  renderList();
}

// ── Modal ──
function openModal(id) {
  editingId = id || null;
  const modal = document.getElementById('modalOverlay');
  const titleEl = document.getElementById('modalTitle');

  // 更新分类下拉框
  updateCategorySelect();

  if (id) {
    const diaries = loadDiaries();
    const diary = diaries.find(d => d.id === id);
    if (!diary) return;
    titleEl.textContent = '编辑日记';
    document.getElementById('formTitle').value = diary.title || '';
    document.getElementById('formContent').value = diary.content || '';
    document.getElementById('formDate').value = diary.date || todayStr();
    document.getElementById('formCategory').value = diary.category || '';
  } else {
    titleEl.textContent = '写日记';
    document.getElementById('formTitle').value = '';
    document.getElementById('formContent').value = '';
    document.getElementById('formDate').value = todayStr();
    document.getElementById('formCategory').value = '';
  }

  modal.classList.add('open');
  setTimeout(() => document.getElementById('formTitle').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ── Save ──
function saveDiary() {
  const title = document.getElementById('formTitle').value.trim();
  const content = document.getElementById('formContent').value.trim();
  const date = document.getElementById('formDate').value;
  const category = document.getElementById('formCategory').value;

  if (!title) {
    showToast('请填写标题');
    document.getElementById('formTitle').focus();
    return;
  }
  if (!content) {
    showToast('请填写内容');
    document.getElementById('formContent').focus();
    return;
  }

  const diaries = loadDiaries();

  if (editingId) {
    // 更新日记
    const idx = diaries.findIndex(d => d.id === editingId);
    if (idx !== -1) {
      diaries[idx] = { ...diaries[idx], title, content, date, category };
    }
    saveDiaries(diaries);
    closeModal();
    showToast('✅ 已保存更改');
    if (currentDiaryId === editingId) {
      showDetail(editingId);
    } else {
      renderList();
    }
  } else {
    // 创建新日记
    const entry = {
      id: genId(),
      title,
      content,
      date: date || todayStr(),
      category,
      createdAt: Date.now()
    };
    diaries.push(entry);
    saveDiaries(diaries);
    closeModal();
    renderList();
    showToast('📝 日记已保存');
  }
}

// ── Edit from Detail ──
function editCurrentDiary() {
  if (!currentDiaryId) return;
  openModal(currentDiaryId);
}

// ── Delete ──
function deleteCurrentDiary() {
  if (!currentDiaryId) return;
  pendingDeleteId = currentDiaryId;
  document.getElementById('confirmOverlay').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
  pendingDeleteId = null;
}

function confirmDelete() {
  if (!pendingDeleteId) return;
  const diaries = loadDiaries().filter(d => d.id !== pendingDeleteId);
  saveDiaries(diaries);
  closeConfirm();
  showToast('🗑 已删除');
  showList();
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ── Keyboard Shortcuts ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('confirmOverlay').classList.contains('open')) {
      closeConfirm();
    } else if (document.getElementById('modalOverlay').classList.contains('open')) {
      closeModal();
    } else if (document.getElementById('categoryModalOverlay').classList.contains('open')) {
      closeCategoryModal();
    } else if (document.getElementById('detailView').style.display === 'block') {
      showList();
    }
  }
  // Ctrl/Cmd + Enter to save
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    if (document.getElementById('modalOverlay').classList.contains('open')) {
      saveDiary();
    }
  }
});

// ── HTML Escape ──
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
